<!DOCTYPE html>
<html>
<head>
  <base href="/">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="description" content="Sistema de gestión de pedidos para La Bomba">

  <!-- PWA meta tags -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="La Bomba">
  <meta name="theme-color" content="#FF6B35">

  <link rel="apple-touch-icon" href="icons/Icon-192.png">
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>La Bomba - Sistema de Pedidos</title>
  <link rel="manifest" href="manifest.json">

  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">

  <style>
    body, html { margin: 0; padding: 0; background: #1a1a2e; color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
    #boot-status {
      position: fixed; inset: 0; display: flex; align-items: center;
      justify-content: center; flex-direction: column; gap: 16px;
      padding: 20px; text-align: center; z-index: 1;
    }
    #boot-spinner {
      width: 48px; height: 48px; border: 3px solid rgba(255,255,255,0.15);
      border-top-color: #ff6b35; border-radius: 50%;
      animation: bs 0.8s linear infinite;
    }
    @keyframes bs { to { transform: rotate(360deg); } }
    #boot-msg { font-size: 14px; color: rgba(255,255,255,0.7); }
    #boot-error {
      display: none; max-width: 500px; padding: 16px;
      background: rgba(255,80,80,0.15); border: 1px solid rgba(255,80,80,0.4);
      border-radius: 8px; font-size: 13px; line-height: 1.5;
    }
    #boot-error a { color: #ffa07a; }
  </style>
</head>
<body>
  <div id="boot-status">
    <div id="boot-spinner"></div>
    <div id="boot-msg">Cargando La Bomba...</div>
    <div id="boot-error"></div>
  </div>

  <script>
    // Loader visible mientras Flutter inicializa.
    // Se ESCONDE automáticamente cuando Flutter renderiza su primer frame
    // (evento 'flutter-first-frame'). Si después de 15s no terminó,
    // muestra instrucciones de troubleshooting.
    (function () {
      var status = document.getElementById('boot-status');
      var msg = document.getElementById('boot-msg');
      var err = document.getElementById('boot-error');
      var done = false;

      function hideLoader() {
        if (done) return;
        done = true;
        if (status) status.style.display = 'none';
      }

      // Flutter Web dispara este evento al renderizar el primer frame.
      window.addEventListener('flutter-first-frame', hideLoader);

      // Fallback: cuando Flutter inserta su canvas en el DOM
      // (algunas versiones no disparan flutter-first-frame en web).
      var observer = new MutationObserver(function () {
        if (document.querySelector('flutter-view, flt-glass-pane, flt-scene-host')) {
          hideLoader();
          observer.disconnect();
        }
      });
      observer.observe(document.body, { childList: true, subtree: true });

      // Mensaje de error si el bootstrap se cuelga
      setTimeout(function () {
        if (done) return;
        msg.textContent = 'La carga está demorando más de lo esperado.';
        err.style.display = 'block';
        err.innerHTML =
          'Si seguís viendo esta pantalla, hay datos antiguos en tu navegador. ' +
          'Probá: Hard refresh (Cmd+Shift+R / Ctrl+Shift+R) o ' +
          '<a href="/reset.html">abrir limpieza</a>.';
      }, 15000);
    })();
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
